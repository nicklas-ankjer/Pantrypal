<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover" />
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#4A7C59" />
  <meta name="description" content="Kitchen Counter - Manage your kitchen inventory, recipes, and shopping lists" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kitchen Counter" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
  
  <!-- Favicon -->
  <link rel="icon" href="/icon-192.png" />
  
  <title>Kitchen Counter</title>
  
  <style>
    /* Prevent FOUC */
    html, body, #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #F8F9FA;
    }
    
    /* PWA install prompt banner styles */
    .pwa-install-prompt {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: linear-gradient(135deg, #4A7C59 0%, #3d6b4a 100%);
      color: white;
      padding: 16px 20px;
      border-radius: 12px;
      display: none;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 9999;
    }
    .pwa-install-prompt.show {
      display: flex;
    }
    .pwa-install-text {
      flex: 1;
    }
    .pwa-install-text h4 {
      margin: 0 0 4px 0;
      font-size: 16px;
    }
    .pwa-install-text p {
      margin: 0;
      font-size: 13px;
      opacity: 0.9;
    }
    .pwa-install-btn {
      background: white;
      color: #4A7C59;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-left: 16px;
    }
    .pwa-dismiss-btn {
      background: none;
      border: none;
      color: white;
      opacity: 0.7;
      cursor: pointer;
      padding: 8px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <!-- PWA Install Prompt -->
  <div id="pwa-install-prompt" class="pwa-install-prompt">
    <div class="pwa-install-text">
      <h4>📱 Install Kitchen Counter</h4>
      <p>Add to your home screen for quick access</p>
    </div>
    <button id="pwa-install-btn" class="pwa-install-btn">Install</button>
    <button id="pwa-dismiss-btn" class="pwa-dismiss-btn">✕</button>
  </div>
  
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('ServiceWorker registered:', registration.scope);
          })
          .catch((error) => {
            console.log('ServiceWorker registration failed:', error);
          });
      });
    }
    
    // PWA Install Prompt
    let deferredPrompt;
    const installPrompt = document.getElementById('pwa-install-prompt');
    const installBtn = document.getElementById('pwa-install-btn');
    const dismissBtn = document.getElementById('pwa-dismiss-btn');
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      // Check if user has dismissed before
      if (!localStorage.getItem('pwa-install-dismissed')) {
        installPrompt.classList.add('show');
      }
    });
    
    installBtn?.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('Install prompt outcome:', outcome);
        deferredPrompt = null;
        installPrompt.classList.remove('show');
      }
    });
    
    dismissBtn?.addEventListener('click', () => {
      installPrompt.classList.remove('show');
      localStorage.setItem('pwa-install-dismissed', 'true');
    });
    
    // Hide prompt if app is installed
    window.addEventListener('appinstalled', () => {
      console.log('PWA installed');
      installPrompt.classList.remove('show');
      deferredPrompt = null;
    });
  </script>
</body>
</html>
